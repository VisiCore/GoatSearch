[sysCreateNewTenant]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
description = SYSTEM SEARCH: This search creates a new tenant from the fields populated on the setup page. It returns the new _key in case we need to invalidate other default tenants' status.
dispatch.earliest_time = -1m
dispatch.latest_time = now
search = | inputlookup goatsearch_env WHERE tenant="$tenant$" workspace="$workspace$" clientId="$clientId$"\
| rename\
    _key AS id\
| join type="outer" tenant workspace clientid [\
    | makeresults\
    | eval\
        tenant="$tenant$",\
        workspace="$workspace$",\
        clientId="$clientId$",\
        clientSecret="$clientSecret$",\
        default="$default$"\
    | goatpass\
    | outputlookup append=t goatsearch_env\
]

[sysDeleteTenant]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
description = SYSTEM SEARCH: This search removes a tenant from the configured list.
dispatch.earliest_time = -1m
dispatch.latest_time = now
search = | inputlookup goatsearch_env WHERE _key != "$key$"\
| outputlookup goatsearch_env

[sysEditTenant]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
description = SYSTEM SEARCH: This search saves the edits to a tenant on the setup view.
dispatch.earliest_time = -1m
dispatch.latest_time = now
search = | inputlookup goatsearch_env WHERE _key="$tenant_key$"\
| eval\
    tenant="$tenant$",\
    workspace="$workspace$",\
    clientId="$clientId$",\
    clientSecret="$clientSecret$",\
    default="$default$"\
| goatpass\
| outputlookup append=t goatsearch_env\
| rename\
    _key AS id

[sysGetConfiguredTenants]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
description = SYSTEM SEARCH: This search returns a list of tenants and formats the controls field so that he custom table renderer can activate the buttons.
dispatch.earliest_time = -1m
dispatch.latest_time = now
search = | inputlookup goatsearch_env\
| eval\
    controls=_key+";"+default\
| fields tenant, workspace, clientId, default, controls

[sysGetTenantList]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
description = SYSTEM SEARCH: This search gets the tenant list for the GoatSearch Explorer view.
dispatch.earliest_time = -1m
dispatch.latest_time = now
search = | inputlookup goatsearch_env\
| fields tenant

[sysGetWorkspaceList]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
description = SYSTEM SEARCH: This search gets the workspaces for a selected tenant to use on the GoatSearch Explorer view.
dispatch.earliest_time = -1m
dispatch.latest_time = now
search = | inputlookup goatsearch_env WHERE tenant="$tenant$"\
| fields workspace

[sysLoadEditTenant]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
description = SYSTEM SEARCH: This search loads a single tenant by _key,
dispatch.earliest_time = -1m
dispatch.latest_time = now
search = | inputlookup goatsearch_env WHERE _key="$key$"

[sysResetDefault]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
description = SYSTEM SEARCH: This search sets the default value to "0" for all tenants other than the specified id.
dispatch.earliest_time = -1m
dispatch.latest_time = now
search = | inputlookup goatsearch_env WHERE _key!="$last_created_id$"\
| eval\
    default=0,\
    checkpoint="$clear_default$"\
| outputlookup append=t goatsearch_env

[sysSetDefault]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
description = SYSTEM SEARCH: This search sets default status for the specified ID and is usually called just before sysResetDefault.
dispatch.earliest_time = -1m
dispatch.latest_time = now
search = | inputlookup goatsearch_env WHERE _key="$default_tenant_id$"\
| eval\
    default="1"\
| outputlookup append=t goatsearch_env\
| rename\
    _key AS id

[goatpass-command]
comment1 = Securely set the Client Secret for a configured Cribl.Cloud tenant.
description = Use goatpass to set your Client Secret using Splunk's Storage Passwords endpoint. Although\
    this will work if you know what you are doing, this is not designed to be used standalone.\
    YOU HAVE BEEN WARNED.
example1 = goatpass tenant="your-cribl-tenant" key="your-configured-tenant-key" secret="your-client-secret"
shortdesc = Streaming command that securely updates Client Secrets as Splunk Passwords.
syntax = goatpass (<goatpass-options>)
usage = public

[goatpass-options]
description = Securely set a client secret and set the app to configured on success. Success requires a valid\
    goatsearch configuration.
syntax = tenant=<tenant> | key=<_key> | secret=<client_secret>

[goatsearch-command]
comment1 = Performs a Cribl Search in Splunk.
description = Use goatsearch to execute a search in your Cribl.Cloud environment and use those results\
    in a Splunk search bar. Goatsearch respects the time range from the time range picker or earliest/latest\
    API parameters.
example1 = goatsearch tenant="your-cribl-tenant" query="dataset='demo_data' | limit=1000"
shortdesc = Generating command that presents Cribl Search results in a Splunk search.
syntax = goatsearch (<goatsearch-options>)?
usage = public

[goatsearch-options]
description = goatsearch allows you to execute a search in your Cribl.Cloud environment\
    and use those results in a Splunk search. Goatsearch respects the time range from the time range picker or earliest/latest\
    API parameters.
syntax = tenant=<string> | query=<string> | sample=<int> | page=<int> | workspace=<string> | debug=<bool> | earliest=<string> | latest=<string>
